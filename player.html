    <script>
        let fullDatabase = [];

        // 1. Load the saved theme preference from LocalStorage
        function applySavedTheme() {
            const savedTheme = localStorage.getItem('themePreference') || 'dark';
            document.getElementById('htmlTag').setAttribute('data-bs-theme', savedTheme);
            document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        }

        function toggleTheme() {
            const htmlTag = document.getElementById('htmlTag');
            const themeIcon = document.getElementById('themeIcon');
            const currentTheme = htmlTag.getAttribute('data-bs-theme');
            
            if (currentTheme === 'dark') {
                htmlTag.setAttribute('data-bs-theme', 'light');
                themeIcon.className = 'fa-solid fa-sun';
                localStorage.setItem('themePreference', 'light');
            } else {
                htmlTag.setAttribute('data-bs-theme', 'dark');
                themeIcon.className = 'fa-solid fa-moon';
                localStorage.setItem('themePreference', 'dark');
            }
        }

        // 2. Get the video ID from the URL (Example: player.html?id=2)
        function getVideoIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // 3. Load videos.json and render the player
        async function initPlayerSystem() {
            applySavedTheme();
            const currentId = getVideoIdFromUrl();

            try {
                const response = await fetch('videos.json');
                fullDatabase = await response.json();

                // Find the video matching the URL parameter
                const targetVideo = fullDatabase.find(v => v.id == currentId);

                if (targetVideo) {
                    renderMainTheater(targetVideo);
                    renderAsideRecommendations(currentId);
                } else {
                    // If the ID is invalid, load the first available video
                    if(fullDatabase.length > 0) {
                        renderMainTheater(fullDatabase[0]);
                        renderAsideRecommendations(fullDatabase[0].id);
                    }
                }
            } catch (error) {
                console.error("Sistem gagal memuat database video player:", error);
            }
        }

        // 4. Render the main video data into the player
        function renderMainTheater(video) {
            const videoPlayer = document.getElementById('mainVideoFrame');
            videoPlayer.src = video.url;
            videoPlayer.load();
            document.getElementById('mainVideoTitle').innerText = video.title;
            document.getElementById('mainVideoAuthor').innerHTML = `<i class="fa-solid fa-circle-user me-2 text-success fs-5"></i>${video.author}`;
            const randomViews = getRandomViews(video.id, video.views);

            document.getElementById('mainVideoViews').innerHTML =
                `<i class="fa-regular fa-eye me-1 text-success"></i>${randomViews.toLocaleString('de-DE')} `;
            
            // Load the full description from JSON
            document.getElementById('mainVideoDesc').innerText = video.description || 'No description available for this video.';
            
            document.title = `${video.title}`;
        }

        // 5. Render the recommendations list
        // Generate random views and keep them stable in the same browser
        function getRandomViews(videoId, baseViews) {
            const storageKey = `video_views_${videoId}`;
            let views = localStorage.getItem(storageKey);

            if (!views) {
                views = Number(baseViews) + Math.floor(Math.random() * 50000);
                localStorage.setItem(storageKey, views);
            }

            return Number(views);
        }

        function renderAsideRecommendations(excludeId) {
            const asideWrapper = document.getElementById('asideRecommendationWrapper');
            asideWrapper.innerHTML = "";

            // Exclude the currently playing video from the recommendations
            const filteredRecommendations = fullDatabase
    .filter(v => v.id != excludeId)
    .sort(() => Math.random() - 0.5)
    .slice(0, 5);

            if(filteredRecommendations.length === 0) {
                asideWrapper.innerHTML = `<div class="text-muted small">No more recommended videos available.</div>`;
                return;
            }

            filteredRecommendations.forEach(video => {
                asideWrapper.innerHTML += `
                    <a href="player.html?id=${video.id}" class="rec-item-card">
                        <div class="rec-thumb">
                            <img src="${video.thumbnail}" alt="Thumbnail">
                        </div>
                        <div class="rec-body">
                            <h4 class="rec-title">${video.title}</h4>
                            <div class="rec-meta">
                                <span><i class="fa-solid fa-circle-user me-1 text-success"></i>${video.author}</span>
                                <span><i class="fa-regular fa-eye me-1 text-success"></i>${getRandomViews(video.id, video.views).toLocaleString('de-DE')}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
        }

        function setupMobileVideoControls() {
            const video = document.getElementById('mainVideoFrame');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const muteBtn = document.getElementById('muteBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const progress = document.getElementById('videoProgress');
            const player = document.getElementById('customVideoPlayer');

            if (!video) return;

            function updatePlayIcon() {
                playPauseBtn.innerHTML = video.paused
                    ? '<i class="fa-solid fa-play"></i>'
                    : '<i class="fa-solid fa-pause"></i>';
            }

            playPauseBtn.addEventListener('click', () => {
                if (video.paused) video.play();
                else video.pause();
            });

            video.addEventListener('play', updatePlayIcon);
            video.addEventListener('pause', updatePlayIcon);

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                muteBtn.innerHTML = video.muted
                    ? '<i class="fa-solid fa-volume-xmark"></i>'
                    : '<i class="fa-solid fa-volume-high"></i>';
            });

            video.addEventListener('timeupdate', () => {
                if (video.duration) {
                    progress.value = (video.currentTime / video.duration) * 100;
                }
            });

            progress.addEventListener('input', () => {
                if (video.duration) {
                    video.currentTime = (progress.value / 100) * video.duration;
                }
            });

            fullscreenBtn.addEventListener('click', async () => {
                try {
                    if (document.fullscreenElement) {
                        await document.exitFullscreen();
                    } else if (player.requestFullscreen) {
                        await player.requestFullscreen();
                    } else if (video.webkitEnterFullscreen) {
                        video.webkitEnterFullscreen();
                    }
                } catch (error) {
                    console.log('Fullscreen is not available:', error);
                }
            });

            // Tap the video to play/pause on Android and iOS.
            video.addEventListener('click', () => {
                if (video.paused) video.play();
                else video.pause();
            });

            updatePlayIcon();
        }

        window.onload = function() { initPlayerSystem(); setupMobileVideoControls(); };
    </script>
