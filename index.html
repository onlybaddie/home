<!DOCTYPE html>
<html lang="en-US" data-bs-theme="dark" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Baddiex Videos</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://cdn.aceimg.com/KeMhTe9lo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* THEME VARIABLES (DARK/LIGHT) */
        [data-bs-theme="dark"] {
            --body-bg: #060913;
            --card-bg: #0f1626;
            --text-main: #94a3b8;
            --text-title: #f8fafc;
            --navbar-bg: rgba(15, 22, 38, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --search-bg: rgba(6, 9, 19, 0.6);
            --paging-btn-bg: rgba(255, 255, 255, 0.03);
            --footer-bg: #0b101d;
        }

        [data-bs-theme="light"] {
            --body-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #64748b;
            --text-title: #0f172a;
            --navbar-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(15, 23, 42, 0.08);
            --search-bg: rgba(241, 245, 249, 0.9);
            --paging-btn-bg: rgba(0, 0, 0, 0.03);
            --footer-bg: #f1f5f9;
        }

        :root {
            --primary-color: #10b981; /* Hijau Emerald */
            --primary-glow: rgba(16, 185, 129, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 0px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3, h4, h5, .navbar-brand { font-family: 'Poppins', sans-serif; }
        a { text-decoration: none; }

        /* NAVBAR HEADER */
        .navbar {
            background-color: var(--navbar-bg) !important;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 0; z-index: 1100;
        }
        .navbar-brand { font-size: 24px; font-weight: 700; color: var(--text-title) !important; letter-spacing: -0.5px; }
        .navbar-brand span { color: var(--primary-color); }
        .navbar-toggler { border: none; padding: 6px; }
        .navbar-toggler:focus { box-shadow: none; }

        .search-box { position: relative; width: 100%; }
        .search-input {
            width: 100%; background-color: var(--search-bg); border: 1px solid var(--border-color);
            padding: 9px 16px 9px 42px; border-radius: 10px; font-size: 14px; color: var(--text-title);
            transition: all 0.25s ease;
        }
        .search-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 4px var(--primary-glow); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.5; color: var(--text-main); }

        .navbar-nav .nav-link { color: var(--text-main); font-size: 14px; font-weight: 500; padding: 8px 18px !important; border-radius: 8px; transition: all 0.2s; }
        .navbar-nav .nav-link:hover, .navbar-nav .nav-link.active { color: var(--primary-color) !important; background-color: rgba(16, 185, 129, 0.08); }

        .theme-toggle-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-title);
            width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; background-color: var(--card-bg);
        }
        .theme-toggle-btn:hover { border-color: var(--primary-color); color: var(--primary-color); box-shadow: 0 0 10px var(--primary-glow); }
        .header-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary-color), #059669); color: #060913; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }

        /* REVISI MOBILE DROPDOWN: TAMBAHKAN GARIS PEMBATAS UNTUK INDEX */
@media (max-width: 991.98px) {
    .navbar-collapse { 
        background-color: var(--card-bg); 
        margin-top: 12px; 
        padding: 14px; 
        border-radius: 14px; 
        border: 1px solid var(--border-color); 
    }
    .navbar-nav .nav-item {
        border-bottom: 1px solid var(--border-color);
    }
    .navbar-nav .nav-item:last-child {
        border-bottom: none; /* Biar menu terakhir bersih tanpa garis bawah */
    }
    .navbar-nav .nav-link {
        padding: 12px 10px !important; /* Memberikan ruang ketukan yang pas di HP */
    }
}

        /* FILTER & SWITCHER CONTAINER CONTROL */
        .filter-control-wrapper {
            display: flex; align-items: center; justify-content: space-between; gap: 15px;
            max-width: 1200px; margin: 0 auto 24px auto;
        }
        .category-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; flex-grow: 1; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .chip-filter { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 18px; border-radius: 20px; font-size: 13px; white-space: nowrap; transition: all 0.2s; }
        .chip-filter.active, .chip-filter:hover { background-color: var(--primary-color); color: var(--body-bg); border-color: var(--primary-color); font-weight: 600; }

        /* LAYOUT SWITCHER BUTTON DESIGN */
        .layout-switcher-container { display: none; gap: 6px; background-color: var(--card-bg); border: 1px solid var(--border-color); padding: 4px; border-radius: 12px; flex-shrink: 0; }
        .switch-layout-btn {
            background: none; border: none; color: var(--text-main); width: 36px; height: 36px; 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .switch-layout-btn:hover { color: var(--primary-color); }
        .switch-layout-btn.active { background-color: var(--primary-color); color: #060913 !important; }

        /* ==========================================================================
           DYNAMIC SYSTEM GRID & LIST CONTROLLER ENGINE
           ========================================================================== */
        .cinema-main-wrapper { max-width: 1200px; margin: 0 auto; }
        
        /* --- 1. KONDISI PRESET: MODE GRID --- */
        .cinema-main-wrapper.mode-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
        }
        .mode-grid .video-cinema-card { display: flex; flex-direction: column; height: 100%; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); background-color: var(--card-bg); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .mode-grid .thumb-wrapper { width: 100%; aspect-ratio: 16 / 9; position: relative; overflow: hidden; background-color: #000; }
        .mode-grid .cinema-card-body { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .mode-grid .cinema-card-title { font-size: 16px; font-weight: 600; color: var(--text-title); margin-bottom: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .mode-grid .cinema-card-desc { font-size: 13px; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 15px; opacity: 0.85; }
        .mode-grid .cinema-card-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; opacity: 0.7; border-top: 1px solid var(--border-color); padding-top: 14px; }

        /* --- 2. KONDISI PRESET: MODE LIST --- */
        .cinema-main-wrapper.mode-list {
            display: flex; flex-direction: column; gap: 12px; max-width: 900px; margin: 0 auto;
        }
        .mode-list .video-cinema-card { display: flex; flex-direction: row; height: 170px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); background-color: var(--card-bg); transition: all 0.3s ease; }
        .mode-list .thumb-wrapper { width: 300px; height: 100%; position: relative; overflow: hidden; flex-shrink: 0; background-color: #000; }
        .mode-list .cinema-card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .mode-list .cinema-card-title { font-size: 17px; font-weight: 600; color: var(--text-title); margin-bottom: 6px; }
        .mode-list .cinema-card-desc { font-size: 13.5px; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; opacity: 0.8; }
        .mode-list .cinema-card-meta { display: flex; align-items: center; gap: 10px; font-size: 12.5px; opacity: 0.7; }

        /* UNIVERSAL CARD HOVER EFFECT */
        .video-cinema-card:hover { transform: translateY(-4px); border-color: var(--primary-color); box-shadow: 0 15px 35px rgba(16, 185, 129, 0.12); }
        .video-cinema-card:hover .thumb-wrapper img { transform: scale(1.05); }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .badge-timestamp { position: absolute; bottom: 12px; right: 12px; background-color: rgba(6, 9, 19, 0.85); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }

        /* RESPONSIVE BREAKPOINT CONTROLLER */
        @media (max-width: 1199.98px) {
            .cinema-main-wrapper.mode-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }

        @media (max-width: 767.98px) {
            body { padding-bottom: 95px; }
            /* Penyesuaian Mode Grid di HP */
            .cinema-main-wrapper.mode-grid { grid-template-columns: 1fr; gap: 12px; }
            .mode-grid .thumb-wrapper {
        aspect-ratio: 21 / 9; /* Khusus di HP tinggi thumbnail menyusut */
    }
            /* Penyesuaian Mode List di HP (Lebih Padat) */
            .cinema-main-wrapper.mode-list .video-cinema-card { height: 140px; gap: 0; }
            .cinema-main-wrapper.mode-list .thumb-wrapper { width: 200px; }
            .cinema-main-wrapper.mode-list .cinema-card-body { padding: 12px; }
            .cinema-main-wrapper.mode-list .cinema-card-title { font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
            .cinema-main-wrapper.mode-list .cinema-card-desc { display: none; }
            .cinema-main-wrapper.mode-list .cinema-card-meta { font-size: 11px; }
        }

        @media (max-width: 480px) {
            .cinema-main-wrapper.mode-list .video-cinema-card { height: 115px; }
            .cinema-main-wrapper.mode-list .thumb-wrapper { width: 145px; }
            .cinema-main-wrapper.mode-list .cinema-card-title { font-size: 13px; }
            .cinema-main-wrapper.mode-list .cinema-card-meta { font-size: 10px; gap: 4px; }
        }

        /* PAGINATION CONTROLLER */
        .premium-pagination-container { display: flex; justify-content: center; align-items: center; gap: 12px; max-width: 1200px; margin: 40px auto; }
        .paging-btn {
            background-color: var(--paging-btn-bg); border: 1px solid var(--border-color); color: var(--text-title); padding: 10px 22px; border-radius: 12px;
            font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.25s ease; user-select: none;
        }
        .paging-btn:hover:not(:disabled) { background-color: var(--primary-color); color: #060913; border-color: var(--primary-color); }
        .paging-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .paging-info { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-title); height: 44px; padding: 0 20px; border-radius: 12px; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
        .paging-info span { color: var(--primary-color); margin: 0 4px; }

        @media (max-width: 767.98px) {
            .premium-pagination-container { margin: 25px auto; }
            .paging-btn span { display: none; }
            .paging-info { font-size: 12px; height: 40px; padding: 0 14px; }
        }

        /* PREMIUM WEB FOOTER */
        .premium-web-footer { background-color: var(--footer-bg); border-top: 1px solid var(--border-color); padding: 60px 0 30px 0; margin-top: 60px; transition: background-color 0.3s ease; }
        .footer-brand { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-title); margin-bottom: 16px; }
        .footer-brand span { color: var(--primary-color); }
        .footer-text { font-size: 13.5px; color: var(--text-main); line-height: 1.6; opacity: 0.85; }
        .footer-heading { font-size: 15px; font-weight: 600; color: var(--text-title); margin-bottom: 20px; letter-spacing: 0.5px; text-transform: uppercase; }
        .footer-links { list-style: none; padding: 0; margin: 0; }
        .footer-links li { margin-bottom: 12px; }
        .footer-links a { color: var(--text-main); font-size: 14px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
        .footer-links a:hover { color: var(--primary-color); transform: translateX(3px); }
        .footer-social-box { display: flex; gap: 12px; margin-top: 15px; }
        .social-round-btn { width: 38px; height: 38px; background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-title); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; }
        .social-round-btn:hover { border-color: var(--primary-color); color: var(--primary-color); transform: translateY(-3px); }
        .footer-bottom-bar { border-top: 1px solid var(--border-color); margin-top: 45px; padding-top: 25px; font-size: 13px; color: var(--text-main); opacity: 0.7; }

        @media (max-width: 991.98px) { .premium-web-footer { display: none !important; } }
@media (max-width: 991.98px) {
    /* --- TAMBAHKAN CSS UNTUK EFEK MELAYANG INI --- */
    .navbar {
        top: 12px; /* Jarak dari atas layar biar lepas/melayang */
        left: 12px;
        right: 12px;
        width: calc(100% - 24px) !important; /* Biar ada jarak kanan-kiri */

        border: 1px solid var(--border-color); /* Garis tepi tipis penegas efek kaca */
        
        /* Bayangan tegas yang bikin efeknya bener-bener kayak ngambang di atas konten */
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25); 
        
        padding: 10px 0;
        transition: all 0.3s ease;
    }

    /* Sesuaikan dropdown menu mobile biar melengkungnya serasi dengan navbar luar */
    .navbar-collapse { 
        background-color: var(--card-bg); 
        margin-top: 10px; 
        padding: 14px; 
        border-radius: 14px; 
        border: 1px solid var(--border-color); 
    }
    
    /* ... sisa kode di dalam media query 991.98px yang lama tetep biarin ... */
    .navbar-nav .nav-item { border-bottom: 1px solid var(--border-color); }
    .navbar-nav .nav-item:last-child { border-bottom: none; }
    .navbar-nav .nav-link { padding: 12px 10px !important; }
}
        /* BOTTOM NAV BAR MOBILE */
        .bottom-nav-bar {
            position: fixed; bottom: 16px; left: 16px; right: 16px;
            background-color: var(--navbar-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); 
            border: 1px solid var(--border-color); border-radius: 10px;
            display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 1050; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .bottom-nav-item { background: none; border: none; color: var(--text-main); display: flex; flex-direction: column; align-items: center; position: relative; padding: 6px 14px; transition: all 0.3s ease; }
        .bottom-nav-item i { font-size: 18px; margin-bottom: 2px; }
        .bottom-nav-item span { font-size: 10px; font-weight: 500; }
        .bottom-nav-item::after { content: ''; position: absolute; bottom: -2px; width: 4px; height: 4px; background-color: transparent; border-radius: 50%; transition: all 0.3s ease; }
        .bottom-nav-item.active { color: var(--primary-color); }
        .bottom-nav-item.active i { transform: translateY(-3px); color: var(--primary-color); }
        .bottom-nav-item.active::after { background-color: var(--primary-color); box-shadow: 0 0 8px var(--primary-color); width: 12px; border-radius: 4px; }

        @media (min-width: 992px) { .bottom-nav-bar { display: none !important; } }
        /* DUMMY PLAY BUTTON GLASSMORPHISM EFFECT */
        .play-btn-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 18px;
            opacity: 0; /* Sembunyikan di awal */
            z-index: 2;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Efek ikon play sedikit digeser ke kanan agar pas di tengah lingkaran secara visual */
        .play-btn-overlay i {
            margin-left: 3px;
            transition: transform 0.3s ease;
        }

        /* CARD HOVER EFFECT - Memunculkan Tombol Play */
        .video-cinema-card:hover .play-btn-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            background: rgba(16, 185, 129, 0.8); /* Berubah jadi hijau emerald bawaan tema lu saat di-hover */
            border-color: var(--primary-color);
            color: #060913; /* Warna icon mengikuti bg body utama */
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .video-cinema-card:hover .play-btn-overlay i {
            transform: scale(1.1);
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let localDatabase = [];
        let globalFilteredData = []; 
        let currentActiveCategory = "All Content";
        
        let currentPage = 1;
        const itemsPerPage = 15; 

        // LOGIKAL UTAMA LAYOUT CONTROLLER SWITCHER
        function changeDisplayMode(targetMode) {
            const container = document.getElementById('cinemaGridContainer');
            const btnGrid = document.getElementById('btnModeGrid');
            const btnList = document.getElementById('btnModeList');

            if (targetMode === 'list') {
                container.classList.remove('mode-grid');
                container.classList.add('mode-list');
                btnList.classList.add('active');
                btnGrid.classList.remove('active');
                localStorage.setItem('displayLayoutPreference', 'list');
            } else {
                container.classList.remove('mode-list');
                container.classList.add('mode-grid');
                btnGrid.classList.add('active');
                btnList.classList.remove('active');
                localStorage.setItem('displayLayoutPreference', 'grid');
            }
            
            // Render ulang agar data menyesuaikan struktur class baru
            calculateAndRenderPage();
        }

        function applySavedLayoutAndTheme() {
            // 1. Ambil Preferensi Tema
            const savedTheme = localStorage.getItem('themePreference') || 'dark';
            document.getElementById('htmlTag').setAttribute('data-bs-theme', savedTheme);
            document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';

            // 2. Ambil Preferensi Layout (Default diatur ke Grid agar desktop & mobile selaras di awal)
            const savedLayout = localStorage.getItem('displayLayoutPreference') || 'grid';
            changeDisplayMode(savedLayout);
        }

        function toggleTheme() {
            const htmlTag = document.getElementById('htmlTag');
            const themeIcon = document.getElementById('themeIcon');
            const currentTheme = htmlTag.getAttribute('data-bs-theme');
            
            if (currentTheme === 'dark') {
                htmlTag.setAttribute('data-bs-theme', 'light');
                themeIcon.className = 'fa-solid fa-sun';
                localStorage.setItem('themePreference', 'light');
            } else {
                htmlTag.setAttribute('data-bs-theme', 'dark');
                themeIcon.className = 'fa-solid fa-moon';
                localStorage.setItem('themePreference', 'dark');
            }
        }

        function formatDateUS(stringTanggal) {
            if(!stringTanggal) return "";
            return new Date(stringTanggal).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        async function loadCinemaDatabase() {
            applySavedLayoutAndTheme();
            try {
                const response = await fetch('videos.json');
                localDatabase = await response.json();
                globalFilteredData = [...localDatabase];
                calculateAndRenderPage();
            } catch (error) {
                console.error("Failed to sync data:", error);
            }
        }

        function calculateAndRenderPage() {
            const totalItems = globalFilteredData.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = globalFilteredData.slice(startIndex, endIndex);

            renderCinemaGrid(paginatedItems);

            document.getElementById('currentPageNum').innerText = currentPage;
            document.getElementById('totalPageNum').innerText = totalPages;
            
            document.getElementById('btnPrevPage').disabled = (currentPage === 1);
            document.getElementById('btnNextPage').disabled = (currentPage === totalPages);

            const pagingWrapper = document.getElementById('paginationWrapper');
            if (totalItems <= itemsPerPage) {
                pagingWrapper.style.setProperty('display', 'none', 'important');
            } else {
                pagingWrapper.style.setProperty('display', 'flex', 'important');
            }
        }
        // Generate random views and keep them stable in the same browser
        function getRandomViews(videoId, baseViews) {
            const storageKey = `video_views_${videoId}`;
            let views = localStorage.getItem(storageKey);

            if (!views) {
                views = Number(baseViews || 0) + Math.floor(Math.random() * 50000);
                localStorage.setItem(storageKey, views);
            }

            return Number(views);
        }

        function renderCinemaGrid(data) {
    const gridContainer = document.getElementById('cinemaGridContainer');
    gridContainer.innerHTML = "";

    if (data.length === 0) {
        gridContainer.innerHTML = `<div class="text-center text-white-50 my-5 py-5 w-100">No video content found</div>`;
        return;
    }

    data.forEach((video) => {
        gridContainer.innerHTML += `
            <a href="player.html?id=${video.id}" class="video-cinema-card">
                <div class="thumb-wrapper">
                    <img src="${video.thumbnail}" alt="Poster">
                    <div class="play-btn-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                    <span class="badge-timestamp">${video.duration}</span>
                </div>
                <div class="cinema-card-body">
                    <div>
                        <h4 class="cinema-card-title" align="justify">${video.title}</h4>
                    </div>
                    <div class="cinema-card-meta d-flex justify-content-between align-items-center w-100">
                        <span class="meta-author">
                            <i class="fa-solid fa-circle-user me-1 text-success"></i>${video.author}
                        </span>
                        <span class="meta-views">
                            <i class="fa-regular fa-eye me-1 text-success"></i>${getRandomViews(video.id, video.views).toLocaleString('de-DE')}
                        </span>
                    </div>
                </div>
            </a>
        `;
    });
}
        function goToPreviousPage() {
            if (currentPage > 1) {
                currentPage--;
                calculateAndRenderPage();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function goToNextPage() {
            const totalPages = Math.ceil(globalFilteredData.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                calculateAndRenderPage();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function filterCategory(categoryName) {
            currentActiveCategory = categoryName;
            document.querySelectorAll('#categoryChipsContainer .chip-filter').forEach(chip => {
                chip.classList.toggle('active', chip.innerText === categoryName);
            });
            currentPage = 1; 
            executeCombinedFilter();
        }

        function filterSearch(query) { 
            currentPage = 1; 
            executeCombinedFilter(); 
        }

        function executeCombinedFilter() {
            const searchQuery = document.getElementById('searchField').value.toLowerCase();
            
            globalFilteredData = localDatabase.filter(video => {
                const matchCategory = (currentActiveCategory === "All Content" || video.category === currentActiveCategory);
                const matchQuery = video.title.toLowerCase().includes(searchQuery) || video.author.toLowerCase().includes(searchQuery);
                return matchCategory && matchQuery;
            });

            calculateAndRenderPage();
        }

        function handleNavClick(button) {
            document.querySelectorAll('.bottom-nav-item').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
        }

        window.onload = loadCinemaDatabase;
    </script>
